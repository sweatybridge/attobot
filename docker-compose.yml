services:
  db:
    build:
      context: .
    environment:
      POSTGRES_PASSWORD: postgres
      ATTOBOT_API_KEY: ${ATTOBOT_API_KEY:-}
      ATTOBOT_MODEL: ${ATTOBOT_MODEL:-deepseek-v4-pro}
      ATTOBOT_API_BASE: ${ATTOBOT_API_BASE:-https://api.deepseek.com/v1}
      ATTOBOT_TEMPERATURE: ${ATTOBOT_TEMPERATURE:-1.0}
      ATTOBOT_REASONING_EFFORT: ${ATTOBOT_REASONING_EFFORT:-medium}
      ATTOBOT_CONTEXT_TOKENS: ${ATTOBOT_CONTEXT_TOKENS:-1000000}
      ATTOBOT_MULTIMODAL_SUPPORT: ${ATTOBOT_MULTIMODAL_SUPPORT:-false}
      ATTOBOT_TELEGRAM_TOKEN: ${ATTOBOT_TELEGRAM_TOKEN:-}
      ATTOBOT_TELEGRAM_CHAT_ID: ${ATTOBOT_TELEGRAM_CHAT_ID:-}
      ATTOBOT_TELEGRAM_THREAD_ID: ${ATTOBOT_TELEGRAM_THREAD_ID:-}
      ATTOBOT_TELEGRAM_API_BASE: ${ATTOBOT_TELEGRAM_API_BASE:-https://api.telegram.org}
      ATTOBOT_TELEGRAM_POLL_CRON: ${ATTOBOT_TELEGRAM_POLL_CRON:-* * * * *}
    ports:
      - "5432:5432"
    volumes:
      - attobot_pgdata:/var/lib/postgresql

volumes:
  attobot_pgdata:
